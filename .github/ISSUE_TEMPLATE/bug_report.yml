name: "Bug report"
description: Report a problem with siibra-python.
labels: [bug]

body:

  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug in siibra-python.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have checked that this issue has not already been reported.
          required: true
        - label: I have confirmed that this issue occurs with the latest released version of [siibra](https://pypi.org/project/siibra/).
          required: true
        - label: I have removed any credentials, access tokens, or sensitive data from the report and logs.
          required: true

  - type: textarea
    id: example
    attributes:
      label: Reproducible example
      description: >
        Provide a minimal, self-contained, copy-pasteable example that reproduces
        the issue. Include the actual output or exception if applicable.
      value: |
        ```python
        import siibra

        ````
        ```
        ````
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Issue description
      description: >
        Describe what happened and provide any additional context that may be
        relevant, such as the atlas, parcellation, space, region, feature, or
        data provider involved.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: >
        Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Traceback or log output
      description: >
        Paste the complete traceback or relevant log output.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment information
      description: >
        Paste the output of the commands below. Include relevant optional
        dependencies when the issue involves a specific data format or feature.
      value: |
        <details>

        ```shell
        python --version
        python -c "import siibra; print(siibra.__version__)"
        ```

        </details>

    validations:
      required: true
