name: e2e Test
on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: "3.8"
      use-cfg:
        required: false
        type: string
        default: ''
      siibra_log_level:
        required: false
        type: string
        default: "INFO_WO_PROGRESS_BARS"

jobs:
  discover-e2e-tests:
    runs-on: ${{ inputs.os }}
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: discover
        shell: bash
        run: |
          matrix=$(
            find e2e -type f -name 'test_*.py' ! -name 'test_examples.py' \
              | sort \
              | jq -R -s -c '
                  split("\n")
                  | map(select(length > 0))
                  | {
                      include: map({
                        name: (. | sub("\\.py$"; "") | gsub("/"; "-")),
                        test_target: .
                      })
                    }
                '
          )
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  e2e:
    needs: discover-e2e-tests
    runs-on: ${{ inputs.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-e2e-tests.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - if: ${{ inputs.use-cfg != '' }}
      uses: './.github/workflows/setup-custom-cfg'
      with:
        siibra-cfg-ref: ${{ inputs.use-cfg }}

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -U .
        pip install -r requirements-test.txt
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install test dependencies
      run:  pip install pytest pytest-cov coverage

    - name: e2e / ${{ matrix.name }}
      env:
        SIIBRA_LOG_LEVEL: ${{ inputs.siibra_log_level }}
      shell: bash
      run: pytest -rx "${{ matrix.test_target }}" --durations=50
