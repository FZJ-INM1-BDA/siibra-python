name: Test examples

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      python-version:
        required: true
        type: string
        default: "3.9"
      use-cfg:
        required: false
        type: string
        default: ""
      siibra_log_level:
        required: false
        type: string
        default: "WARNING"

jobs:
  test_examples:
    runs-on: ${{ inputs.os }}

    env:
      SIIBRA_LOG_LEVEL: ${{ inputs.siibra_log_level }}
      JOB_DIR: ${{ github.workspace }}/.ci-test-examples-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ inputs.python-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Define job directories
        shell: bash
        run: |
          {
            echo "VIRTUAL_ENV=$JOB_DIR/venv"
            echo "SIIBRA_CACHEDIR=$JOB_DIR/siibra-cache"
            echo "UV_CACHE_DIR=$JOB_DIR/uv-cache"
            echo "UV_PYTHON_INSTALL_DIR=$JOB_DIR/python"
          } >> "$GITHUB_ENV"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Create virtual environment
        shell: bash
        run: |
          mkdir -p "$JOB_DIR" "$SIIBRA_CACHEDIR"

          uv venv "$VIRTUAL_ENV" \
            --python "${{ inputs.python-version }}"

          echo "$VIRTUAL_ENV/bin" >> "$GITHUB_PATH"

      - name: Set up custom siibra configuration
        if: ${{ inputs.use-cfg != '' }}
        uses: ./.github/workflows/setup-custom-cfg
        with:
          siibra-cfg-ref: ${{ inputs.use-cfg }}

      - name: Install project and test dependencies
        shell: bash
        run: |
          uv pip install \
            --python "$VIRTUAL_ENV/bin/python" \
            . \
            -r requirements-test.txt

      - name: Test example notebooks
        shell: bash
        run: |
          pytest e2e/examples/test_examples.py -rx -v --durations=5

      - name: Clean up
        if: ${{ always() }}
        continue-on-error: true
        shell: bash
        run: |
          rm -rf -- "$JOB_DIR"

          find "$GITHUB_WORKSPACE" \
            -mindepth 1 \
            -maxdepth 1 \
            -exec rm -rf -- {} +
