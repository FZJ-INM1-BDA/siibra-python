name: '[Docs] Build docs and upload artifacts'
on:
  push:
    branches: [ 'main', 'doc_*', 'v1' ]
  release:
    types: [ 'published' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  notebooks:
    name: "Build and run the notebooks for the docs"
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U .
          python -m pip install -r ./docs/requirements-doc.txt
      - name: Build the docs and execute the notebooks
        run: |
          sphinx-build docs ./docs/_build/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sphinx-docs-built-in-github-${{ github.sha }}
          path: docs/_build/
          retention-days: 7

  upload-to-rtd:
    name: "Package and push built docs to RTD"
    runs-on: ubuntu-latest
    permissions: {}
    needs: notebooks
    steps:
      - name: Download built docs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: sphinx-docs-built-in-github-${{ github.sha }}
          path: docs/_build/html
      - name: Package built docs
        run: tar -czf docs-built.tar.gz -C docs/_build/html .
      - name: Push to RTD
        env:
          RTDS_TOKEN: ${{ secrets.RTDS_WEBHOOK_TOKEN }}
          RTDS_URL: ${{ secrets.RTDS_WEBHOOK_URL }}
        run: |
          if [[ ! "$RTDS_URL" =~ ^https://[a-zA-Z0-9._-]+\.[a-zA-Z]{2,}/ ]]; then
            echo "ERROR: RTDS_URL does not look like a valid HTTPS URL"
            exit 1
          fi
          curl --fail-with-body -X POST \
            -H "Authorization: Token $RTDS_TOKEN" \
            -F "artifact=@docs-built.tar.gz" \
            "$RTDS_URL"

  cleanup:
    name: "Clean up build artifacts and siibra cache"
    runs-on: self-hosted
    permissions: {}
    needs: [notebooks, upload-to-rtd]
    if: always()
    steps:
      - name: Clear siibra cache
        continue-on-error: true
        run: |
          python -c "import siibra; siibra.cache.clear()"
      - name: Remove checked-out repository files
        continue-on-error: true
        run: |
          rm -rf ${{ github.workspace }}/*
          rm -rf /tmp/*
