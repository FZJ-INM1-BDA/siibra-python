name: "[Docs] Build docs and upload artifacts"

on:
  push:
    branches: ["main", "doc_*", "v1"]
  release:
    types: ["published"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  notebooks:
    name: Build and run the notebooks for the docs
    runs-on: self-hosted

    permissions:
      contents: read

    env:
      PYTHON_VERSION: "3.11"
      JOB_DIR: ${{ github.workspace }}/.ci-docs-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
      SIIBRA_LOG_LEVEL: ERROR
      SIIBRA_NG_VOL_USE_CACHE: "True"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Define job directories
        shell: bash
        run: |
          {
            echo "VIRTUAL_ENV=$JOB_DIR/venv"
            echo "SIIBRA_CACHEDIR=$JOB_DIR/siibra-cache"
            echo "UV_CACHE_DIR=$JOB_DIR/uv-cache"
            echo "UV_PYTHON_INSTALL_DIR=$JOB_DIR/python"
            echo "MPLCONFIGDIR=$JOB_DIR/matplotlib"
          } >> "$GITHUB_ENV"
          
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Create virtual environment
        shell: bash
        run: |
          mkdir -p "$JOB_DIR" "$SIIBRA_CACHEDIR"
          uv venv "$VIRTUAL_ENV" --python "$PYTHON_VERSION"
          echo "$VIRTUAL_ENV/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        shell: bash
        run: |
          uv pip install \
            --python "$VIRTUAL_ENV/bin/python" \
            . \
            -r docs/requirements-doc.txt

      - name: Build the docs and execute the notebooks
        shell: bash
        run: |
          python -m sphinx docs docs/_build

      - name: Upload built docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sphinx-docs-built-in-github-${{ github.sha }}
          path: docs
          retention-days: 2

      - name: Clean up
        if: ${{ always() }}
        continue-on-error: true
        shell: bash
        run: |
          rm -rf -- "$JOB_DIR"

          find "$GITHUB_WORKSPACE" \
            -mindepth 1 \
            -maxdepth 1 \
            -exec rm -rf -- {} +

  upload-to-rtd:
    name: Trigger RTD build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    needs: notebooks
    steps:
      - name: Trigger RTD build
        uses: dfm/rtds-action@e028de3bdec9ae8e4bda371425986df0fb6cc4bf # v1.1.0
        with:
          webhook_url: ${{ secrets.RTDS_WEBHOOK_URL }}
          webhook_token: ${{ secrets.RTDS_WEBHOOK_TOKEN }}
          commit_ref: ${{ github.ref }}
