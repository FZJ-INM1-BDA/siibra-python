name: '[Docs] Build docs and upload artifacts'

on:
  push:
    branches: [ 'main', 'doc_*', 'v1'] 
  release:
    types: [ 'published' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  notebooks:
    name: "Build and run the notebooks for the docs"
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U .
          python -m pip install -r ./docs/requirements-doc.txt

      - name: Build the docs and execute the notebooks
        run: sphinx-build docs ./docs/_build/

      - name: Upload built docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sphinx-docs-built-in-github-${{ github.sha }}
          path: docs
          retention-days: 7

      - name: Clear siibra cache
        if: ${{ always() }}
        continue-on-error: true
        run: |
          python -c "import siibra; siibra.cache.clear()"

      - name: Remove checked-out repository files
        if: ${{ always() }}
        continue-on-error: true
        run: |
          rm -rf "${{ github.workspace }}"/*
          rm -rf /tmp/*

  trigger-rtd-build:
    name: "Trigger RTD build"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: notebooks
    steps:
      - name: Trigger RTD build
        env:
          RTDS_WEBHOOK_URL: ${{ secrets.RTDS_WEBHOOK_URL }}
          RTDS_WEBHOOK_TOKEN: ${{ secrets.RTDS_WEBHOOK_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "release" ]; then
            rtd_version="$RELEASE_TAG"
          elif [ "$REF_TYPE" = "branch" ] || [ "$REF_TYPE" = "tag" ]; then
            rtd_version="$REF_NAME"
          else
            echo "Unsupported event/ref for ReadTheDocs build: $EVENT_NAME / $REF_TYPE" >&2
            exit 0
          fi

          if [ -z "$rtd_version" ]; then
            echo "Could not determine ReadTheDocs version to build" >&2
            exit 1
          fi

          echo "Triggering ReadTheDocs build for version: $rtd_version"

          curl -fsS -X POST "$RTDS_WEBHOOK_URL" \
            -d "branches=$rtd_version" \
            -d "token=$RTDS_WEBHOOK_TOKEN"
